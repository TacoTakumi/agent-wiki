[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-wiki"
version = "0.1.0"
description = "A personal knowledge base for AI agents"
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
]

[project.scripts]
awiki = "agent_wiki.cli:cli"
aw = "agent_wiki.cli:cli"

[tool.pytest.ini_options]
testpaths = ["tests"]
